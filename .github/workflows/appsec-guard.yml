name: "🛡️ AppSec Rules Protection"

on:
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  appsec-guard:
    name: "🔒 Security Rules Integrity"
    runs-on: secops-app-sec
    outputs:
      has_violation: ${{ steps.detect.outputs.has_violation }}
      changed_files: ${{ steps.detect.outputs.changed_files }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b525c5a8446c685325700831b63 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: "🛡️ Detect changes to AppSec steering files"
        id: detect
        run: |
          PROTECTED_FILES=(
            ".kiro/steering/appsec-rules.md"
            ".claude/rules/appsec-rules.md"
            ".cursor/rules/appsec-rules.mdc"
            ".github/copilot-instructions.md"
          )

          APPSEC_CANONICAL_MARKER="SECURITY CRITICAL RULES"
          CHANGED_FILES=""
          HAS_VIOLATION="false"

          for file in "${PROTECTED_FILES[@]}"; do
            if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q "^${file}$"; then
              if git show "origin/${{ github.base_ref }}:${file}" &>/dev/null; then
                BASE_LINES=$(git show "origin/${{ github.base_ref }}:${file}" 2>/dev/null | wc -l | tr -d ' ')
                PR_LINES=$(wc -l < "$file" 2>/dev/null | tr -d ' ' || echo "0")

                if [ -f "$file" ] && grep -q "$APPSEC_CANONICAL_MARKER" "$file"; then
                  echo "  ℹ️  ${file} updated by extension (canonical marker) — allowed"
                elif [ "$PR_LINES" -ge "$BASE_LINES" ] && [ "$PR_LINES" -gt 10 ]; then
                  echo "  ℹ️  ${file} grew (rules added) — allowed"
                else
                  HAS_VIOLATION="true"
                  CHANGED_FILES="${CHANGED_FILES}${file},"
                  echo "  ⚠️  ${file} REDUCED from ${BASE_LINES} to ${PR_LINES} lines — BLOCKED"
                fi
              else
                echo "  ℹ️  ${file} first creation — allowed"
              fi
            fi
          done

          echo "has_violation=${HAS_VIOLATION}" >> $GITHUB_OUTPUT
          echo "changed_files=${CHANGED_FILES}" >> $GITHUB_OUTPUT

          if [ "$HAS_VIOLATION" = "true" ]; then
            exit 1
          fi

  hook-integrity:
    name: "🪝 Hook Integrity"
    runs-on: secops-app-sec
    outputs:
      has_issue: ${{ steps.hook-check.outputs.has_issue }}
      issue_type: ${{ steps.hook-check.outputs.issue_type }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b525c5a8446c685325700831b63 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: "🪝 Verify pre-commit hook integrity"
        id: hook-check
        run: |
          HOOK_FILE=".appsec/appsec-gate.sh"
          HAS_ISSUE="false"
          ISSUE_TYPE=""

          if [ ! -f "$HOOK_FILE" ]; then
            HAS_ISSUE="true"
            ISSUE_TYPE="deleted"
          elif git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -q "^${HOOK_FILE}$"; then
            if git show "origin/${{ github.base_ref }}:${HOOK_FILE}" &>/dev/null; then
              HAS_ISSUE="true"
              ISSUE_TYPE="modified"
            fi
          fi

          if [ -f "$HOOK_FILE" ] && [ ! -x "$HOOK_FILE" ]; then
            if git show "origin/${{ github.base_ref }}:${HOOK_FILE}" &>/dev/null; then
              HAS_ISSUE="true"
              ISSUE_TYPE="disabled"
            fi
          fi

          echo "has_issue=${HAS_ISSUE}" >> $GITHUB_OUTPUT
          echo "issue_type=${ISSUE_TYPE}" >> $GITHUB_OUTPUT

          if [ "$HAS_ISSUE" = "true" ]; then
            exit 1
          fi

  sast-scan:
    name: "🔍 SAST Scan"
    runs-on: secops-app-sec
    outputs:
      has_findings: ${{ steps.scan.outputs.has_findings }}
      findings_summary: ${{ steps.scan.outputs.findings_summary }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b525c5a8446c685325700831b63 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Install OpenGrep
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "🔍 Run SAST scan on changed files"
        id: scan
        run: |
          RULES_FILE="rules/security.yml"
          DISMISSED_FILE=".appsec/dismissed.json"

          if [ ! -f "$RULES_FILE" ]; then
            echo "has_findings=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -iE '\.(ts|tsx|js|jsx|mjs|cjs|java|kt|kts|py|pyi|go|rb|php|c|h|cpp|cs|swift|rs|scala)$' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "has_findings=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TMPFILE=$(mktemp)
          opengrep scan --json --quiet --config="$RULES_FILE" $CHANGED_FILES > "$TMPFILE" 2>/dev/null || true

          python3 << 'EOF'
          import sys, json, os

          tmpfile = os.environ.get('TMPFILE', '$TMPFILE')
          dismissed_file = "$DISMISSED_FILE"

          # Read tmpfile path from shell variable
          tmpfile = "$TMPFILE"

          try:
              with open(tmpfile) as f: data = json.load(f)
              results = data.get('results', [])
          except:
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as gh:
                  gh.write('has_findings=false\n')
              sys.exit(0)
          finally:
              if os.path.exists(tmpfile): os.unlink(tmpfile)

          if not results:
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as gh:
                  gh.write('has_findings=false\n')
              sys.exit(0)

          # Filter dismissed findings
          dismissed_keys = set()
          if os.path.exists(dismissed_file):
              try:
                  for d in json.load(open(dismissed_file)):
                      rid = d.get('id','')
                      rn = rid.split('.rules.')[-1] if '.rules.' in rid else rid.split('.')[-1]
                      dismissed_keys.update([(rn, d.get('file',''), d.get('line',0)), (rn, d.get('file',''), 0)])
              except: pass

          if dismissed_keys:
              filtered = []
              for r in results:
                  cid = r.get('check_id','')
                  rn = cid.split('.rules.')[-1] if '.rules.' in cid else cid.split('.')[-1]
                  fp, ln = r.get('path',''), r.get('start',{}).get('line',0)
                  if (rn, fp, ln) not in dismissed_keys and (rn, fp, 0) not in dismissed_keys:
                      filtered.append(r)
              results = filtered

          if not results:
              with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as gh:
                  gh.write('has_findings=false\n')
              sys.exit(0)

          # Save findings for the report job
          with open('sast-findings.json', 'w') as f:
              json.dump(results, f)

          total = len(results)
          errors = sum(1 for r in results if r.get('extra',{}).get('severity','').upper() == 'ERROR')

          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as gh:
              gh.write('has_findings=true\n')
              gh.write(f'findings_summary={total} finding(s), {errors} critical/high\n')

          sys.exit(1 if errors > 0 else 0)
          EOF

      - name: Upload SAST findings
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sast-findings
          path: sast-findings.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════════
  # SINGLE UNIFIED PR COMMENT — consolidates all 3 checks into one clean report
  # ═══════════════════════════════════════════════════════════════════════════════
  report:
    name: "📋 Security Report"
    runs-on: secops-app-sec
    needs: [appsec-guard, hook-integrity, sast-scan]
    if: always() && (needs.appsec-guard.result == 'failure' || needs.hook-integrity.result == 'failure' || needs.sast-scan.result == 'failure')
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@11bd71901bbe5b525c5a8446c685325700831b63 # v4.2.2
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Download SAST findings
        if: needs.sast-scan.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: sast-findings
        continue-on-error: true

      - name: "💬 Post unified security report"
        uses: actions/github-script@v7.0.1
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const baseBranch = context.payload.pull_request.base.ref;

            const guardFailed = '${{ needs.appsec-guard.result }}' === 'failure';
            const hookFailed = '${{ needs.hook-integrity.result }}' === 'failure';
            const sastFailed = '${{ needs.sast-scan.result }}' === 'failure';

            const sections = [];

            // ─── Header ───────────────────────────────────────────────────
            const failCount = [guardFailed, hookFailed, sastFailed].filter(Boolean).length;
            sections.push(`## 🛡️ AppSec Security Report`);
            sections.push('');
            sections.push(`| Check | Status |`);
            sections.push(`|-------|--------|`);
            sections.push(`| Security Rules Integrity | ${guardFailed ? '❌ Falhou' : '✅ OK'} |`);
            sections.push(`| Pre-Commit Hook | ${hookFailed ? '❌ Falhou' : '✅ OK'} |`);
            sections.push(`| SAST Scan | ${sastFailed ? '❌ Falhou' : '✅ OK'} |`);
            sections.push('');

            // ─── Section 1: Steering file violations ──────────────────────
            if (guardFailed) {
              const changedFiles = '${{ needs.appsec-guard.outputs.changed_files }}'.split(',').filter(Boolean);

              sections.push(`---`);
              sections.push('');
              sections.push(`### 🔒 Arquivos de segurança protegidos foram alterados`);
              sections.push('');
              sections.push(changedFiles.map(f => `- \`${f}\``).join('\n'));
              sections.push('');

              // Show diffs in collapsible sections
              for (const file of changedFiles) {
                try {
                  const diff = execSync(
                    `git diff "origin/${baseBranch}...HEAD" -- "${file}"`,
                    { encoding: 'utf-8' }
                  ).trim();
                  if (diff) {
                    sections.push(`<details><summary>Diff: <code>${file}</code></summary>\n\n\`\`\`diff\n${diff}\n\`\`\`\n</details>`);
                  }
                } catch (e) {}
              }
              sections.push('');
              sections.push(`> **Como resolver:** \`git checkout origin/${baseBranch} -- ${changedFiles.join(' ')}\``);
              sections.push('');
            }

            // ─── Section 2: Hook integrity ────────────────────────────────
            if (hookFailed) {
              const issueType = '${{ needs.hook-integrity.outputs.issue_type }}';
              const hookFile = '.appsec/appsec-gate.sh';

              sections.push(`---`);
              sections.push('');
              sections.push(`### 🪝 Hook de segurança comprometido`);
              sections.push('');

              if (issueType === 'deleted') {
                sections.push(`O hook \`${hookFile}\` foi **removido** nesta PR.`);
              } else if (issueType === 'modified') {
                sections.push(`O hook \`${hookFile}\` foi **modificado** nesta PR.`);
              } else if (issueType === 'disabled') {
                sections.push(`O hook \`${hookFile}\` teve **permissão de execução removida**.`);
              }

              sections.push('');
              if (issueType === 'disabled') {
                sections.push(`> **Como resolver:** \`chmod +x ${hookFile} && git add ${hookFile}\``);
              } else {
                sections.push(`> **Como resolver:** \`git checkout origin/${baseBranch} -- ${hookFile}\``);
              }
              sections.push('');
            }

            // ─── Section 3: SAST findings ─────────────────────────────────
            if (sastFailed) {
              let findings = [];
              try {
                findings = JSON.parse(fs.readFileSync('sast-findings.json', 'utf-8'));
              } catch (e) {}

              sections.push(`---`);
              sections.push('');
              sections.push(`### 🔍 SAST — Vulnerabilidades detectadas`);
              sections.push('');

              if (findings.length > 0) {
                const errors = findings.filter(f => (f.extra?.severity || '').toUpperCase() === 'ERROR').length;
                const warnings = findings.filter(f => (f.extra?.severity || '').toUpperCase() === 'WARNING').length;
                const infos = findings.length - errors - warnings;

                const badges = [];
                if (errors) badges.push(`🔴 ${errors} critical/high`);
                if (warnings) badges.push(`🟡 ${warnings} medium`);
                if (infos) badges.push(`🔵 ${infos} low/info`);
                sections.push(badges.join(' · '));
                sections.push('');

                // Table of findings
                sections.push('| | Rule | File | Line |');
                sections.push('|---|---|---|---|');
                for (const f of findings.slice(0, 25)) {
                  const sev = (f.extra?.severity || 'INFO').toUpperCase();
                  const icon = sev === 'ERROR' ? '🔴' : sev === 'WARNING' ? '🟡' : '🔵';
                  const rule = (f.check_id || '?').split('.').pop().replace(/-/g, ' ');
                  const file = f.path || '?';
                  const line = f.start?.line || '?';
                  sections.push(`| ${icon} | ${rule} | \`${file}\` | L${line} |`);
                }
                if (findings.length > 25) {
                  sections.push(`| | ... | +${findings.length - 25} more | |`);
                }
                sections.push('');
                sections.push(`> **Como resolver:** Corrija as vulnerabilidades ou marque como falso positivo na extensão e commite \`.appsec/dismissed.json\`.`);
              } else {
                sections.push(`Findings detectados mas detalhes indisponíveis. Veja os logs do workflow.`);
              }
              sections.push('');
            }

            // ─── Footer ───────────────────────────────────────────────────
            sections.push('---');
            sections.push(`<sub>🤖 Verificação automática — AppSec Security Pipeline · ${failCount} check(s) falharam</sub>`);

            const body = sections.join('\n');

            // Delete previous AppSec comments to avoid accumulation
            try {
              const comments = await github.rest.issues.listComments({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });
              for (const comment of comments.data) {
                if (comment.body && comment.body.startsWith('## 🛡️ AppSec Security Report')) {
                  await github.rest.issues.deleteComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: comment.id
                  });
                }
              }
            } catch (e) {}

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
